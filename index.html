<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The ICP Macro Ledger</title>
<style>
  html, body { margin: 0; padding: 0; background: #12161C; }
  * { box-sizing: border-box; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef } = React;


// ---------- Design tokens ----------
const C = {
  bg: "#12161C",
  panel: "#1A2029",
  panelAlt: "#1F2733",
  line: "#2C3542",
  gold: "#C9A24B",
  goldDim: "#8C7038",
  ink: "#EDE9DD",
  inkDim: "#9BA3AF",
  inkFaint: "#5C6572",
  red: "#C1594B",
  green: "#7A9E7E",
  blue: "#6F8FAE",
};

const serif = "'Iowan Old Style','Palatino Linotype',Georgia,serif";
const mono = "'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace";
const sans = "'Inter','Helvetica Neue',Arial,sans-serif";

// ---------- Live-data plumbing ----------
// This build reads real data from ./data.json, which a scheduled GitHub
// Action refreshes from the St. Louis Fed's FRED API (see scripts/ and
// .github/workflows/). No AI calls, no API keys in the browser — the page
// just loads a small JSON file that lives next to it, containing the
// latest values and ~5 years of actual history per series.

// How each FRED series should be formatted for display.
// HY/IG OAS come from FRED in percent, so bp display multiplies by 100.
const FORMATS = {
  wti:           { fmt: (v) => `$${v.toFixed(2)}/bbl`, deltaUnit: "$", deltaDecimals: 2, period: "vs prior day" },
  brent:         { fmt: (v) => `$${v.toFixed(2)}/bbl`, deltaUnit: "$", deltaDecimals: 2, period: "vs prior day" },
  ust10y:        { fmt: (v) => `${v.toFixed(2)}%`, deltaBp: true, period: "vs prior day" },
  ust2y:         { fmt: (v) => `${v.toFixed(2)}%`, deltaBp: true, period: "vs prior day" },
  curve:         { histScale: 100, fmt: (v) => `${v >= 0 ? "+" : ""}${Math.round(v * 100)}bp`, deltaBp: true, period: "vs prior day" },
  hyoas:         { histScale: 100, fmt: (v) => `${Math.round(v * 100)}bp`, deltaBp: true, period: "vs prior day" },
  igoas:         { histScale: 100, fmt: (v) => `${Math.round(v * 100)}bp`, deltaBp: true, period: "vs prior day" },
  fedfunds:      { fmt: (v) => `${(v - 0.25).toFixed(2)}–${v.toFixed(2)}%`, deltaBp: true, period: "vs prior day" },
  cpiHeadline:   { fmt: (v) => `${v.toFixed(1)}%`, deltaPt: true, period: "vs prior month (YoY)" },
  cpiCore:       { fmt: (v) => `${v.toFixed(1)}%`, deltaPt: true, period: "vs prior month (YoY)" },
  pceHeadline:   { fmt: (v) => `${v.toFixed(1)}%`, deltaPt: true, period: "vs prior month (YoY)" },
  pceCore:       { fmt: (v) => `${v.toFixed(1)}%`, deltaPt: true, period: "vs prior month (YoY)" },
  ppi:           { fmt: (v) => `${v.toFixed(1)}%`, deltaPt: true, period: "vs prior month (YoY)" },
  unemployment:  { fmt: (v) => `${v.toFixed(1)}%`, deltaPt: true, period: "vs prior month" },
  payrolls:      { fmt: (v) => `${v >= 0 ? "+" : ""}${Math.round(v)}K`, deltaUnit: "K", deltaDecimals: 0, period: "vs prior month" },
  ahe:           { fmt: (v) => `${v.toFixed(1)}%`, deltaPt: true, period: "vs prior month (YoY)" },
  claims:        { histScale: 0.001, fmt: (v) => `${Math.round(v / 1000)}K`, deltaUnit: "K", deltaDecimals: 0, deltaScale: 0.001, period: "vs prior week" },
  umich:         { fmt: (v) => v.toFixed(1), deltaPt: true, period: "vs prior month" },
  saving:        { fmt: (v) => `${v.toFixed(1)}%`, deltaPt: true, period: "vs prior month" },
  mortgage30y:   { fmt: (v) => `${v.toFixed(2)}%`, deltaBp: true, period: "vs prior week" },
  housingStarts: { histScale: 0.001, fmt: (v) => `${(v / 1000).toFixed(2)}M`, deltaUnit: "K", deltaDecimals: 0, period: "vs prior month (SAAR)" },
  existingHome:  { histScale: 0.000001, fmt: (v) => `${(v / 1000000).toFixed(2)}M`, deltaUnit: "", deltaDecimals: 0, period: "vs prior month (SAAR)" },
  gdpnow:        { fmt: (v) => `${v >= 0 ? "+" : ""}${v.toFixed(1)}%`, deltaPt: true, period: "vs prior update" },
  gdp:           { fmt: (v) => `${v.toFixed(1)}%`, deltaPt: true, period: "vs prior quarter (SAAR)" },
  ismMfg:        { fmt: (v) => v.toFixed(1), deltaPt: true, period: "vs prior month" },
  vix:           { fmt: (v) => v.toFixed(1), deltaPt: true, period: "vs prior day" },
};

function formatDelta(key, latest, prev) {
  const f = FORMATS[key] || {};
  const rawDiff = latest - prev;
  let text;
  if (f.deltaBp) {
    const bp = Math.round(rawDiff * 100);
    text = `${bp >= 0 ? "+" : ""}${bp}bp`;
  } else if (f.deltaPt) {
    text = `${rawDiff >= 0 ? "+" : ""}${rawDiff.toFixed(1)}pt`;
  } else {
    const scaled = rawDiff * (f.deltaScale || 1);
    const dec = f.deltaDecimals != null ? f.deltaDecimals : 1;
    const u = f.deltaUnit || "";
    const sign = scaled >= 0 ? "+" : "-";
    const mag = Math.abs(scaled).toFixed(dec);
    // Currency symbols read as a prefix ("+$1.28"); other units as a suffix ("+57K").
    text = u === "$" ? `${sign}$${mag}` : `${sign}${mag}${u}`;
  }
  return `${text} ${f.period || ""}`.trim();
}

function shortDateLabel(iso) {
  // "2024-03-01" -> "Mar '24"
  const [y, m] = iso.split("-");
  const names = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  return `${names[parseInt(m, 10) - 1]} '${y.slice(-2)}`;
}

// Builds the context line under each value (the "prior" slot) directly from
// the series' own history, so it refreshes every run instead of going stale.
// Prefers accurate trailing ranges computed server-side (min52/max52/min5y/
// max5y in data.json); falls back to computing from the chart arrays so it
// still works with an older data.json. fedfunds is skipped because its
// formatter is itself a range template.
function computeContext(key, s) {
  const f = FORMATS[key];
  if (!f || key === "fedfunds" || typeof f.fmt !== "function") return null;
  const vals = s.values || [];
  const dates = s.dates || [];
  if (vals.length < 3) return null;

  let min5 = s.min5y, max5 = s.max5y, min52 = s.min52, max52 = s.max52;
  if (min5 == null || max5 == null) {
    min5 = Math.min(...vals);
    max5 = Math.max(...vals);
  }
  if ((min52 == null || max52 == null) && dates.length === vals.length) {
    const latest = new Date(dates[dates.length - 1]);
    const cutoff = new Date(latest);
    cutoff.setFullYear(cutoff.getFullYear() - 1);
    const recent = vals.filter((v, i) => new Date(dates[i]) >= cutoff);
    if (recent.length >= 2) {
      min52 = Math.min(...recent);
      max52 = Math.max(...recent);
    }
  }

  const fmt = (v) => {
    try { return f.fmt(v); } catch (e) { return String(v); }
  };
  let line;
  if (min52 != null && max52 != null) {
    line = `Past year: ${fmt(min52)} – ${fmt(max52)} · 5-yr: ${fmt(min5)} – ${fmt(max5)}`;
  } else {
    line = `5-yr range: ${fmt(min5)} – ${fmt(max5)}`;
  }
  if (s.latestDate) line += ` · latest ${shortDateLabel(s.latestDate)}`;
  return line;
}

function useLiveData() {
  const [liveData, setLiveData] = useState({});
  const [commentary, setCommentary] = useState(null);
  const [releases, setReleases] = useState({});
  const [themes, setThemes] = useState(null);
  const [themeCards, setThemeCards] = useState(null);
  const [calendar, setCalendar] = useState(null);
  const [regime, setRegime] = useState(null);
  const [consensus, setConsensus] = useState(null);
  const [surprises, setSurprises] = useState(null);
  const [prevRun, setPrevRun] = useState(null);
  const [seriesRaw, setSeriesRaw] = useState(null);
  const [status, setStatus] = useState("idle"); // idle | loading | success | partial | error
  const [asOfLive, setAsOfLive] = useState(null);

  async function fetchLive() {
    setStatus("loading");
    try {
      const response = await fetch(`./data.json?cb=${Date.now()}`);
      if (!response.ok) throw new Error(`data.json fetch failed (${response.status})`);
      const payload = await response.json();
      const series = payload.series || {};
      const nd = {};
      Object.keys(series).forEach((key) => {
        const s = series[key];
        const f = FORMATS[key];
        if (!f || s.latest == null || s.prev == null) return;
        const dirEps = 1e-9;
        nd[key] = {
          value: f.fmt(s.latest),
          delta: formatDelta(key, s.latest, s.prev),
          dir: s.latest - s.prev > dirEps ? "up" : s.latest - s.prev < -dirEps ? "down" : "flat",
          history: s.values.map((v) => v * (f.histScale || 1)),
          historyLabels: s.dates.map(shortDateLabel), // one label per point => exact scrub dates
          latestDate: s.latestDate,
          contextLine: computeContext(key, s),
        };
      });
      if (Object.keys(nd).length === 0) throw new Error("No usable series in data.json");
      // Non-FRED values fetched by the commentary generator (ECB, China PMI,
      // ISM Services, retail sales, existing home sales) arrive pre-formatted.
      const extra = payload.extraSeries || {};
      Object.keys(extra).forEach((key) => {
        const e = extra[key];
        if (e && e.value && !nd[key]) {
          nd[key] = { value: e.value, delta: e.delta || "", dir: e.dir || "flat" };
        }
      });
      setLiveData(nd);
      setCommentary(payload.commentary || null);
      setReleases(payload.releases || {});
      setThemes(payload.themes || null);
      setThemeCards(payload.themeCards || null);
      setCalendar(payload.calendar || null);
      setRegime(payload.regime || null);
      setConsensus(payload.consensus || null);
      setSurprises(payload.surprises || null);
      setPrevRun(payload.prevRun || null);
      setSeriesRaw(series);
      setAsOfLive(payload.updated || null);
      setStatus(Object.keys(nd).length >= 15 ? "success" : "partial");
    } catch (e) {
      setStatus("error");
    }
  }

  useEffect(() => {
    fetchLive();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  return { liveData, commentary, releases, themes, themeCards, calendar, regime, consensus, surprises, prevRun, seriesRaw, status, asOfLive, refresh: fetchLive };
}

function Pill({ children, tone = "gold" }) {
  const map = {
    neutral: { bg: "rgba(155,163,175,0.12)", fg: C.inkDim },
    gold: { bg: "rgba(201,162,75,0.14)", fg: C.gold },
    red: { bg: "rgba(193,89,75,0.14)", fg: C.red },
    green: { bg: "rgba(122,158,126,0.14)", fg: C.green },
    blue: { bg: "rgba(111,143,174,0.16)", fg: C.blue },
  };
  const s = map[tone];
  return (
    <span
      style={{
        background: s.bg,
        color: s.fg,
        fontFamily: mono,
        fontSize: 10,
        letterSpacing: 0.4,
        padding: "3px 7px",
        borderRadius: 3,
        textTransform: "uppercase",
        whiteSpace: "nowrap",
      }}
    >
      {children}
    </span>
  );
}

// ---------- Chart helper functions ----------
// Best-effort parsing so a hover/drag readout can show an approximate date
// even for charts that only carry a start/end label rather than one label
// per point (most of them, since exact monthly dates for 2021-2024 are
// reconstructions anyway — see the footer disclaimer).
const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
function parseApproxYear(label) {
  if (!label) return null;
  const monthMatch = label.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)/);
  const yearMatch = label.match(/'(\d{2})\b/) || label.match(/(\d{4})/);
  if (!yearMatch) return null;
  const raw = yearMatch[1];
  const year = raw.length === 2 ? 2000 + parseInt(raw, 10) : parseInt(raw, 10);
  const monthFrac = monthMatch ? MONTHS.indexOf(monthMatch[1]) / 12 : 0;
  return year + monthFrac;
}
function formatApproxDate(yearFloat) {
  const year = Math.floor(yearFloat);
  const monthIdx = Math.max(0, Math.min(11, Math.round((yearFloat - year) * 12)));
  return `${MONTHS[monthIdx]} '${String(year).slice(-2)}`;
}
// Pulls a leading/trailing unit (like "$" or "bp" or "%") off a formatted
// value string so interpolated chart values can be displayed consistently.
function inferUnit(valueStr) {
  if (!valueStr) return { prefix: "", suffix: "" };
  const m = String(valueStr).match(/^([^\d\-]*)[\d.,\-]+([^\d]*)$/);
  if (!m) return { prefix: "", suffix: "" };
  return { prefix: m[1] || "", suffix: m[2] || "" };
}
function inferDecimals(data) {
  let maxDec = 0;
  data.forEach((d) => {
    const s = String(d);
    const dot = s.indexOf(".");
    if (dot >= 0) maxDec = Math.max(maxDec, s.length - dot - 1);
  });
  return Math.min(maxDec, 2);
}

// Interactive chart: taller than before, and supports drag/hover scrubbing —
// press and drag a finger (or mouse) across it to move a vertical guide line
// and see the value + approximate date at that point.
function Sparkline({ data, labels, color = C.gold, valueSample }) {
  const [hoverIdx, setHoverIdx] = useState(null);
  const svgRef = useRef(null);
  const draggingRef = useRef(false);

  if (!data || data.length < 2) return null;

  const w = 300;
  const h = 96;
  const padY = 10;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const stepX = w / (data.length - 1);
  const points = data.map((d, i) => {
    const x = i * stepX;
    const y = h - padY - ((d - min) / range) * (h - padY * 2);
    return [x, y];
  });
  const linePath = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const areaPath = linePath + ` L ${w},${h} L 0,${h} Z`;

  const decimals = inferDecimals(data);
  const { prefix, suffix } = inferUnit(valueSample);
  const exactLabels = labels && labels.length === data.length;

  function labelForIndex(i) {
    if (!labels) return "";
    if (exactLabels) return labels[i];
    const y0 = parseApproxYear(labels[0]);
    const y1 = parseApproxYear(labels[labels.length - 1]);
    if (y0 == null || y1 == null) return "";
    const frac = data.length === 1 ? 0 : i / (data.length - 1);
    return formatApproxDate(y0 + (y1 - y0) * frac);
  }

  function handleMove(clientX) {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const relX = ((clientX - rect.left) / rect.width) * w;
    let idx = Math.round(relX / stepX);
    idx = Math.max(0, Math.min(data.length - 1, idx));
    setHoverIdx(idx);
  }

  const activeIdx = hoverIdx != null ? hoverIdx : data.length - 1;
  const activePoint = points[activeIdx];
  const activeValue = data[activeIdx];

  return (
    <div style={{ marginTop: 14, marginBottom: 4 }}>
      <svg
        ref={svgRef}
        viewBox={`0 0 ${w} ${h}`}
        preserveAspectRatio="none"
        style={{ width: "100%", height: h, display: "block", touchAction: "none", cursor: "crosshair" }}
        onPointerDown={(e) => {
          draggingRef.current = true;
          try {
            e.currentTarget.setPointerCapture(e.pointerId);
          } catch (err) {}
          handleMove(e.clientX);
        }}
        onPointerMove={(e) => {
          if (e.pointerType === "touch" ? draggingRef.current : true) handleMove(e.clientX);
        }}
        onPointerUp={() => {
          draggingRef.current = false;
          setHoverIdx(null);
        }}
        onPointerLeave={() => {
          draggingRef.current = false;
          setHoverIdx(null);
        }}
      >
        <path d={areaPath} fill={color} fillOpacity={0.12} stroke="none" />
        <path d={linePath} fill="none" stroke={color} strokeWidth={1.75} />
        {hoverIdx != null && (
          <line
            x1={activePoint[0]}
            x2={activePoint[0]}
            y1={0}
            y2={h}
            stroke={C.inkDim}
            strokeWidth={1}
            strokeDasharray="3,3"
          />
        )}
        <circle cx={activePoint[0]} cy={activePoint[1]} r={hoverIdx != null ? 3.4 : 2.6} fill={color} />
      </svg>
      {labels && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", fontFamily: mono, fontSize: 9.5, color: C.inkFaint, marginTop: 4 }}>
          <span>{labelForIndex(0)}</span>
          <span style={{ color: hoverIdx != null ? C.ink : C.inkFaint, fontSize: hoverIdx != null ? 11 : 9.5, fontWeight: hoverIdx != null ? 600 : 400 }}>
            {hoverIdx != null
              ? `${labelForIndex(activeIdx)} — ${prefix}${activeValue.toFixed(decimals)}${suffix}`
              : "Press & drag to explore"}
          </span>
          <span>{labelForIndex(data.length - 1)}</span>
        </div>
      )}
    </div>
  );
}

function MetricCard({ m, live }) {
  const liveEntry = m.liveKey ? live.liveData[m.liveKey] : null;
  const value = liveEntry?.value || m.value;
  const delta = liveEntry?.delta || m.delta;
  const dir = liveEntry?.dir || m.dir;
  const isLive = m.forceLive || !!liveEntry || !!(m.themeKey && live.themes?.[m.themeKey]);
  const nextDate = (m.releaseKey && live.releases?.[m.releaseKey]) || m.nextDate;
  const prior = (m.themeKey && live.themes?.[m.themeKey]) || liveEntry?.contextLine || m.prior;

  const dirColor = dir === "up" ? m.upColor || C.red : dir === "down" ? m.downColor || C.green : C.inkFaint;
  const glyph = dir === "up" ? "▲" : dir === "down" ? "▼" : "▬";

  // When live data is present, its full real FRED history (with exact dates)
  // replaces the baked-in reconstructed series entirely.
  const history = liveEntry?.history || m.history || null;
  const historyLabels = liveEntry?.historyLabels || m.historyLabels || null;

  return (
    <div
      style={{
        background: C.panel,
        border: `1px solid ${isLive ? C.goldDim : C.line}`,
        borderRadius: 6,
        padding: "15px 17px",
        display: "flex",
        flexDirection: "column",
      }}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
            <div
              style={{
                fontFamily: sans,
                fontSize: 10.5,
                letterSpacing: 0.6,
                textTransform: "uppercase",
                color: C.inkFaint,
              }}
            >
              {m.label}
            </div>
            {isLive && <Pill tone="blue">Live</Pill>}
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontFamily: mono, fontSize: 24, color: C.ink, fontWeight: 500 }}>{value}</span>
            <span style={{ fontFamily: mono, fontSize: 11.5, color: dirColor }}>
              {glyph} {delta}
            </span>
          </div>
          <div style={{ fontFamily: sans, fontSize: 11.5, color: C.inkDim, marginTop: 4, lineHeight: 1.4 }}>
            {prior}
          </div>
        </div>
        <Pill tone="gold">Next: {nextDate}</Pill>
      </div>

      {history && (
        <Sparkline
          data={history}
          labels={historyLabels}
          color={dirColor === C.inkFaint ? C.gold : dirColor}
          valueSample={value}
        />
      )}

      <div
        style={{
          marginTop: 11,
          paddingTop: 11,
          borderTop: `1px solid ${C.line}`,
          fontFamily: sans,
          fontSize: 12.25,
          lineHeight: 1.55,
          color: C.ink,
        }}
      >
        <span style={{ color: C.gold, fontFamily: mono, fontSize: 10, letterSpacing: 0.5 }}>WHY IT MATTERS — </span>
        <span style={{ color: C.inkDim }}>{m.relevance}</span>
      </div>
    </div>
  );
}

function SectionHeader({ title, note }) {
  return (
    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", margin: "36px 0 14px", flexWrap: "wrap", gap: 6 }}>
      <h2 style={{ fontFamily: serif, fontSize: 19, color: C.ink, margin: 0, fontWeight: 500, letterSpacing: 0.2 }}>{title}</h2>
      {note && <span style={{ fontFamily: sans, fontSize: 11.5, color: C.inkFaint, fontStyle: "italic" }}>{note}</span>}
    </div>
  );
}

function CreditGauge({ live }) {
  const min = 250, max = 900;
  const liveEntry = live.liveData.hyoas;
  const current = liveEntry ? parseFloat(String(liveEntry.value).replace(/[^0-9.]/g, "")) : 269;
  const pct = Math.min(100, Math.max(0, ((current - min) / (max - min)) * 100));
  // Percentile of current spread within its own ~5y history (live data only)
  let pctile = null;
  if (liveEntry?.history && liveEntry.history.length >= 10) {
    const below = liveEntry.history.filter((v) => v < current).length;
    pctile = Math.round((100 * below) / liveEntry.history.length);
  }
  return (
    <div style={{ background: C.panelAlt, border: `1px solid ${C.line}`, borderRadius: 6, padding: "20px 22px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", flexWrap: "wrap", gap: 6 }}>
        <div style={{ fontFamily: sans, fontSize: 11, letterSpacing: 0.6, textTransform: "uppercase", color: C.inkFaint }}>
          Credit Cycle Gauge — HY OAS (ICE BofA)
        </div>
        <div style={{ fontFamily: mono, fontSize: 20, color: C.gold }}>{current}bp</div>
      </div>
      <div
        style={{
          position: "relative",
          height: 8,
          borderRadius: 4,
          marginTop: 16,
          marginBottom: 8,
          background: `linear-gradient(90deg, ${C.green} 0%, ${C.gold} 45%, ${C.red} 100%)`,
        }}
      >
        <div
          style={{
            position: "absolute",
            left: `calc(${pct}% - 6px)`,
            top: -5,
            width: 12,
            height: 18,
            background: C.ink,
            borderRadius: 2,
            boxShadow: "0 0 0 2px #12161C",
          }}
        />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: sans, fontSize: 10.5, color: C.inkFaint, flexWrap: "wrap", gap: 4 }}>
        <span>Tight / late-cycle complacent (&lt;300bp)</span>
        <span>Historical avg (~450bp)</span>
        <span>Recessionary / distressed (&gt;800bp)</span>
      </div>
      <div style={{ marginTop: 14, fontFamily: sans, fontSize: 12.5, color: C.inkDim, lineHeight: 1.55 }}>
        {pctile != null && (
          <span style={{ color: C.ink }}>
            At {current}bp, HY spreads are currently tighter than {100 - pctile}% of readings over the past five
            years.{" "}
          </span>
        )}
        Tight spreads alongside softening macro data are worth watching for special situations sourcing:
        historically, that combination has preceded episodes where dispersion widens well before the index does —
        idiosyncratic credit stress shows up in specific issuers (leveraged, tariff-exposed, or refinancing in
        2026–27) long before the benchmark OAS moves. That dispersion is where situational/special-sits credit
        opportunities tend to originate.
      </div>
    </div>
  );
}

function LiveStatusBar({ live }) {
  const { status, asOfLive, refresh } = live;
  const label =
    status === "loading"
      ? "Loading data…"
      : status === "success"
      ? `Data last refreshed from FRED: ${asOfLive || "recently"}`
      : status === "partial"
      ? `Data last refreshed from FRED: ${asOfLive || "recently"} (a few series unavailable; reviewed snapshot shown for those)`
      : status === "error"
      ? "Couldn't load data.json — showing the reviewed snapshot. Check that the data-refresh workflow has run."
      : "Loading data…";
  const tone = status === "success" ? C.green : status === "partial" ? C.gold : C.inkDim;

  return (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        gap: 12,
        marginTop: 18,
        padding: "10px 14px",
        background: C.panel,
        border: `1px solid ${C.line}`,
        borderRadius: 6,
        flexWrap: "wrap",
      }}
    >
      <span style={{ fontFamily: mono, fontSize: 11, color: tone }}>{label}</span>
      <button
        onClick={refresh}
        disabled={status === "loading"}
        style={{
          fontFamily: mono,
          fontSize: 10.5,
          letterSpacing: 0.5,
          textTransform: "uppercase",
          color: C.gold,
          background: "rgba(201,162,75,0.12)",
          border: `1px solid ${C.goldDim}`,
          borderRadius: 4,
          padding: "6px 12px",
          cursor: status === "loading" ? "default" : "pointer",
          opacity: status === "loading" ? 0.6 : 1,
        }}
      >
        {status === "loading" ? "Refreshing…" : "Refresh Data"}
      </button>
    </div>
  );
}

// #1 — Upcoming releases calendar strip, with #3 consensus merged in.
const IMPACT_STYLE = {
  high: { fg: C.red, label: "High" },
  med: { fg: C.gold, label: "Med" },
  low: { fg: C.inkFaint, label: "Low" },
};
function CalendarStrip({ live }) {
  const cal = live.calendar;
  if (!cal || cal.length === 0) return null;
  const consensus = live.consensus || {};
  const names = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

  return (
    <div style={{ background: C.panelAlt, border: `1px solid ${C.line}`, borderRadius: 6, padding: "20px 22px", marginTop: 12 }}>

        Upcoming Releases — Next 3 Weeks
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        {cal.map((e, i) => {
          const imp = IMPACT_STYLE[e.impact] || IMPACT_STYLE.low;
          const d = new Date(e.date + "T00:00:00");
          const dow = names[d.getDay()];
          const exp = e.consensusKey && consensus[e.consensusKey];
          return (
            <div
              key={i}
              style={{
                display: "flex",
                alignItems: "baseline",
                gap: 12,
                padding: "8px 0",
                borderBottom: i < cal.length - 1 ? `1px solid ${C.line}` : "none",
              }}

              <span style={{ fontFamily: mono, fontSize: 11, color: C.ink, minWidth: 92, flexShrink: 0 }}>
                {dow} {e.display}
              </span>
              <span
                style={{
                  fontFamily: mono,
                  fontSize: 9,
                  letterSpacing: 0.4,
                  textTransform: "uppercase",
                  color: imp.fg,
                  border: `1px solid ${imp.fg}`,
                  borderRadius: 3,

                  flexShrink: 0,
                  opacity: 0.9,
                }}
              >
                {imp.label}

              <span style={{ fontFamily: sans, fontSize: 12.5, color: C.inkDim, flex: 1 }}>{e.label}</span>
              {exp && (
                <span style={{ fontFamily: mono, fontSize: 10.5, color: C.blue, flexShrink: 0 }}>exp: {exp}</span>
              )}
            </div>
          );
        })}
      </div>
      {Object.keys(consensus).length === 0 && (
        <div style={{ fontFamily: sans, fontSize: 10.5, color: C.inkFaint, marginTop: 10, fontStyle: "italic" }}>
          Consensus expectations appear here when enhanced commentary is configured.
        </div>
      )}

  );
}

// #2 — "What changed": biggest movers since the previous refresh (falls back
// to latest-vs-prior-observation when no prior-run snapshot exists), plus any
// consensus surprises (#3) from recent prints.
const MOVER_LABELS = {
  wti: "WTI", brent: "Brent", ust10y: "10Y", ust2y: "2Y", curve: "Curve",
  hyoas: "HY OAS", igoas: "IG OAS", cpiHeadline: "CPI", cpiCore: "Core CPI",
  pceCore: "Core PCE", unemployment: "Unemployment", payrolls: "Payrolls",
  umich: "UMich", mortgage30y: "Mortgage", vix: "VIX", claims: "Claims",
};
function WhatChanged({ live }) {
  const series = live.seriesRaw;
  if (!series) return null;
  const prev = live.prevRun || {};
  const movers = [];

  Object.keys(MOVER_LABELS).forEach((key) => {
    const s = series[key];
    const f = FORMATS[key];
    if (!s || s.latest == null || !f) return;
    let base, changed;
    const p = prev[key];
    if (p && p.latestDate && p.latestDate !== s.latestDate) {
      base = p.latest; // genuine change since last refresh
      changed = true;
    } else if (s.prev != null) {
      base = s.prev; // fall back to last-vs-prior observation
      changed = false;
    } else return;
    const diff = s.latest - base;
    if (Math.abs(diff) < 1e-9) return;
    const denom = Math.abs(base) > 1e-9 ? Math.abs(base) : 1;
    movers.push({ key, diff, magnitude: Math.abs(diff) / denom, changed, deltaText: formatDelta(key, s.latest, base).split(" ")[0] });
  });

  movers.sort((a, b) => b.magnitude - a.magnitude);
  const top = movers.slice(0, 5);
  const surprises = live.surprises || [];
  if (top.length === 0 && surprises.length === 0) return null;

  const anyCrossRun = top.some((m) => m.changed);

  return (
    <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 6, padding: "16px 18px", marginTop: 12 }}>
      <div style={{ fontFamily: sans, fontSize: 11, letterSpacing: 0.6, textTransform: "uppercase", color: C.inkFaint, marginBottom: 12 }}>
        {anyCrossRun ? "What Moved Since Last Refresh" : "Notable Moves in the Latest Data"}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
        {top.map((m) => {
          const up = m.diff > 0;
          const col = up ? C.red : C.green; // up=red convention (tightening/inflationary bias)
          return (
            <div
              key={m.key}
              style={{
                display: "flex",
                alignItems: "baseline",
                gap: 6,
                background: C.panelAlt,
                border: `1px solid ${C.line}`,
                borderRadius: 4,
                padding: "6px 10px",
              }}
            >
              <span style={{ fontFamily: sans, fontSize: 11.5, color: C.inkDim }}>{MOVER_LABELS[m.key]}</span>
              <span style={{ fontFamily: mono, fontSize: 12, color: col }}>
                {up ? "▲" : "▼"} {m.deltaText}
              </span>
            </div>
          );
        })}
      </div>
      {surprises.length > 0 && (
        <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${C.line}` }}>
          <div style={{ fontFamily: sans, fontSize: 10.5, letterSpacing: 0.5, textTransform: "uppercase", color: C.inkFaint, marginBottom: 8 }}>
            Recent Surprises vs. Consensus
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {surprises.map((s, i) => {
              const up = s.dir === "up";
              const col = up ? C.red : s.dir === "down" ? C.green : C.inkFaint;
              return (
                <div key={i} style={{ fontFamily: sans, fontSize: 12.5, color: C.ink }}>
                  <span style={{ fontFamily: mono, color: C.gold, fontSize: 11 }}>{s.label}: </span>
                  actual <span style={{ fontFamily: mono, color: col }}>{s.actual}</span> vs.{" "}
                  <span style={{ fontFamily: mono, color: C.inkDim }}>{s.consensus}</span> expected
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

          Cards marked LIVE display official series from the St. Louis Fed's FRED database (BLS, BEA, Federal
          Reserve, ICE BofA indices, Freddie Mac, Census, U. Michigan, Atlanta Fed), refreshed automatically by a
          scheduled job — the timestamp above shows the last refresh, and charts on those cards are actual ~5-year
          historical series with exact dates, so the drag-to-explore readout is tick-accurate. "This Week's Read"
          is regenerated on each refresh (from the data itself, or from data plus current news when the enhanced
          commentary option is configured — the note beside it says which). Next-release dates are computed from
          published schedules where deterministic (FOMC, jobs, ISM, ECB) and estimated otherwise (marked "est.").
          ECB, China PMI, ISM Services, retail sales, and existing home sales refresh only when enhanced commentary

          and update only with revisions. The regime banner, upcoming-releases calendar, and "what moved" panel are
          computed each refresh from the data and schedules; consensus expectations and recent surprises populate on
          the calendar and moves panel only when enhanced commentary is configured. Nothing here is investment advice.

}
